name: Supabase Shadow Sync

on:
  workflow_dispatch:

jobs:
  sync-shadow:
    runs-on: ubuntu-latest

    steps:
      - name: Validar configuração do Supabase
        id: guard
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Modo aguardando configuração do Supabase
        if: ${{ steps.guard.outputs.ready != 'true' }}
        run: |
          echo "SUPABASE_URL (variable) ou SUPABASE_SERVICE_ROLE_KEY (secret) não configurados."
          echo "Workflow encerrado em modo espera (sem erro)."

      - name: Checkout Repo
        if: ${{ steps.guard.outputs.ready == 'true' }}
        uses: actions/checkout@v6

      - name: Setup Python
        if: ${{ steps.guard.outputs.ready == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Diagnóstico de conexão e schema Supabase
        if: ${{ steps.guard.outputs.ready == 'true' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BOLAO_SEASON_ID: ${{ vars.BOLAO_SEASON_ID }}
        run: |
          echo "Verificando configuração..."
          echo "SUPABASE_URL: ${SUPABASE_URL}"
          echo "BOLAO_SEASON_ID: ${BOLAO_SEASON_ID:-<vazio - será auto>}"

          if [[ "${SUPABASE_URL}" != https://* ]]; then
            echo "SUPABASE_URL inválida. Deve começar com https://"
            exit 1
          fi

          status=$(curl -sS -o /tmp/supabase_check_body.json -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/bolao_seasons?select=season_id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")

          echo "HTTP status do check: ${status}"
          cat /tmp/supabase_check_body.json || true

          if [ "${status}" = "200" ]; then
            echo "Conexão e tabela bolao_seasons OK."
            exit 0
          fi

          if [ "${status}" = "404" ]; then
            echo "Schema não encontrado no Supabase (tabelas bolao_* ausentes)."
            echo "Rode o arquivo supabase/schema.sql no SQL Editor do Supabase."
            exit 1
          fi

          if [ "${status}" = "401" ] || [ "${status}" = "403" ]; then
            echo "Falha de autenticação. Verifique SUPABASE_SERVICE_ROLE_KEY em GitHub Secrets."
            exit 1
          fi

          echo "Falha de conectividade/configuração (status ${status})."
          exit 1

      - name: Sincronizar snapshot do bolão para Supabase
        if: ${{ steps.guard.outputs.ready == 'true' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BOLAO_SEASON_ID: ${{ vars.BOLAO_SEASON_ID }}
        run: |
          python tools/sync_shadow_to_supabase.py
