name: Bolao Auto-Sync

on:
  workflow_dispatch: # Execução manual para sincronizar base oficial da planilha

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para poder commitar os novos JSONs

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Executar Sincronização do Bolão
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          pip install -r requirements.txt
          python tools/action_sync_excel.py
          
      - name: Commitar e Salvar JSONs Gerados
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add api/
          git commit -m "auto(bot): Atualizando resultados da API e ranking calculado" || exit 0
          git push
